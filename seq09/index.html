  <style>
    #accessScreen {
      position: fixed; inset: 0;
      background: #fafaf7;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
    }
    #accessScreen h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 1.4rem;
      color: #1a6b5a;
      margin-bottom: 8px;
    }
    #accessScreen p {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 28px;
    }
    #accessInput {
      padding: 12px 20px;
      font-size: 1rem;
      font-family: 'DM Mono', monospace;
      border: 1.5px solid #c0d4c8;
      border-radius: 8px;
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    #accessInput:focus { border-color: #1a6b5a; }
    #accessBtn {
      padding: 10px 28px;
      background: #1a6b5a;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #accessBtn:hover { background: #145a4a; }
    #accessError {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: #c0392b;
      display: none;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════
       ÉCRAN D'ACCÈS
  ═══════════════════════════════════════ -->
  <div id="accessScreen">
    <h2>Physique-Chimie · Seconde</h2>
    <p>Séquence 09 — Vision et Images</p>
    <input type="password" id="accessInput" placeholder="Code d'accès"
      onkeydown="if(event.key==='Enter') checkAccess()">
    <br>
    <button id="accessBtn" onclick="checkAccess()">Accéder →</button>
    <div id="accessError">Code incorrect. Réessayez.</div>
  </div>

  <script>
    function checkAccess() {
      const code = document.getElementById('accessInput').value;
      if (code === 'seconde2027') {
        document.getElementById('accessScreen').style.display = 'none';
        sessionStorage.setItem('access_seq09', '1');
      } else {
        document.getElementById('accessError').style.display = 'block';
        document.getElementById('accessInput').value = '';
      }
    }
    // Si déjà authentifié dans la session
    if (sessionStorage.getItem('access_seq09') === '1') {
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('accessScreen').style.display = 'none';
      });
    }
  </script>

  <!-- Gestion des onglets -->
  <script>
    function showTab(id, btn) {
      // Cacher tous les panneaux
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      // Désactiver tous les boutons
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      // Afficher le panneau cible
      document.getElementById(id).classList.add('active');
      // Activer le bouton cliqué
      btn.classList.add('active');
    }
  </script>
